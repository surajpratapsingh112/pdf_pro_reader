name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger from GitHub website

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (required for Android build)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      # 3. Setup Flutter
      - name: Setup Flutter 3.22
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      # 4. Show Flutter info
      - name: Flutter version
        run: flutter --version

      # 5. Get packages
      - name: Install dependencies
        run: flutter pub get

      # 6. Build release APK
      - name: Build APK (release)
        run: flutter build apk --release

      # 7. Rename APK for easy identification
      - name: Rename APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk \
             output/PDFProReader_v1.0.apk

      # 8. Upload APK as downloadable artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFProReader_APK
          path: output/PDFProReader_v1.0.apk
          retention-days: 30   # Available for 30 days

      # 9. Print success info
      - name: Build complete
        run: |
          echo "================================="
          echo "  APK built successfully!"
          echo "  File: PDFProReader_v1.0.apk"
          echo "================================="
          ls -lh output/
