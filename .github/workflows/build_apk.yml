name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Flutter version info
        run: flutter --version

      - name: Generate Android project structure
        run: |
          cp android/app/src/main/AndroidManifest.xml /tmp/our_manifest.xml
          flutter create --org com.pdfpro --project-name pdf_pro_reader --platforms android .
          cp /tmp/our_manifest.xml android/app/src/main/AndroidManifest.xml
          echo "Android structure generated"
          ls -la android/app/

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-warnings || true

      - name: Build APK release
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/PDFProReader_v1.0.apk
          ls -lh output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PDFProReader_APK
          path: output/PDFProReader_v1.0.apk
          retention-days: 30
